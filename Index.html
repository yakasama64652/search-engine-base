<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAVA Search</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            display: flex;
            justify-content: flex-end;
            padding: 15px 20px;
            gap: 15px;
            font-size: 13px;
        }

        header a { text-decoration: none; color: rgba(0,0,0,0.87); }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: justify-content 0.3s ease;
        }

        main.searching {
            justify-content: flex-start;
            padding-top: 20px;
        }

        /* Added cursor pointer to the logo link */
        .logo-link {
            text-decoration: none;
            cursor: pointer;
        }

        .logo {
            width: 272px;
            margin-bottom: 30px;
            transition: width 0.3s;
            border: none;
        }

        main.searching .logo {
            width: 150px;
            margin-bottom: 20px;
        }

        .search-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .search-bar-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            width: 584px;
            max-width: 90%;
            padding: 5px 15px;
        }

        .search-bar-wrapper input {
            border: none;
            outline: none;
            height: 34px;
            font-size: 16px;
            flex-grow: 1;
            padding: 0 10px;
        }

        .buttons {
            margin-top: 30px;
            display: flex;
            gap: 12px;
        }

        #results-area {
            margin-top: 40px;
            width: 584px;
            max-width: 90%;
            display: none;
        }

        .result-item {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .result-item a {
            color: #1a0dab;
            font-size: 20px;
            text-decoration: none;
            display: block;
        }

        .result-url {
            color: #202124;
            font-size: 14px;
        }

        .btn {
            background-color: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            padding: 0 16px;
            line-height: 36px;
            cursor: pointer;
        }

        footer { background: #f2f2f2; font-size: 14px; margin-top: auto; }
        .footer-bottom { display: flex; justify-content: space-between; padding: 15px 30px; }
    </style>
</head>
<body>

    <header>
        <a href="#">LAVA Mail</a>
        <a href="#">Images</a>
        <div style="background: #5f6368; width: 32px; height: 32px; border-radius: 50%;"></div>
    </header>

    <main id="main-content">
        <a href="#" class="logo-link" id="home-trigger">
            <img src="https://48034691.fs1.hubspotusercontent-na1.net/hubfs/48034691/__hs-marketplace__/LAVA%20Logo%20-%20Black-1.png" alt="LAVA Automation" class="logo">
        </a>

        <div class="search-container">
            <div class="search-bar-wrapper">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="#9aa0a6"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
                <input type="text" id="search-input" autofocus placeholder="Search LAVA...">
            </div>
            
            <div class="buttons" id="button-row">
                <button class="btn" id="search-btn">LAVA Search</button>
                <button class="btn">I'm Feeling Productive</button>
            </div>

            <div id="results-area">
                <div class="result-item">
                    <span class="result-url">https://university.lavaautomation.com</span>
                    <a href="https://university.lavaautomation.com/" target="_blank">Lava University - Learn Automation</a>
                    <p style="color: #4d5156; font-size: 14px;">The official training platform for LAVA Automation experts.</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-bottom">
            <span>Australia</span>
            <div style="display:flex; gap:20px">
                <span>Privacy</span>
                <span>Terms</span>
            </div>
        </div>
    </footer>

    <script>
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const resultsArea = document.getElementById('results-area');
        const mainContent = document.getElementById('main-content');
        const buttonRow = document.getElementById('button-row');
        const homeTrigger = document.getElementById('home-trigger');

        function performSearch() {
            const query = searchInput.value.toLowerCase().trim();
            
            if (query === "lava university") {
                mainContent.classList.add('searching');
                buttonRow.style.display = "none";
                resultsArea.style.display = "block";
            } else if (query === "") {
                resetToHome();
            } else {
                resultsArea.style.display = "none";
                alert("Try searching for 'lava university'");
            }
        }

        // Function to reset everything back to the "Home" state
        function resetToHome() {
            mainContent.classList.remove('searching');
            buttonRow.style.display = "flex";
            resultsArea.style.display = "none";
            searchInput.value = ""; // Clear the search bar
        }

        // Listener for the LAVA Logo click
        homeTrigger.addEventListener('click', function(e) {
            e.preventDefault(); // Stop page from refreshing
            resetToHome();
        });

        searchBtn.addEventListener('click', function(e) {
            e.preventDefault();
            performSearch();
        });

        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });
    </script>

</body>
</html>
