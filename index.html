<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAVA Search</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .nav-left, .nav-right {
            display: flex;
            gap: 15px;
            font-size: 13px;
            align-items: center;
        }

        nav a { text-decoration: none; color: rgba(0,0,0,0.87); cursor: pointer; }
        nav a:hover { text-decoration: underline; }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        main.searching {
            justify-content: flex-start;
            padding-top: 20px;
        }

        .logo-link { text-decoration: none; cursor: pointer; }

        .logo {
            width: 272px;
            margin-bottom: 30px;
            transition: width 0.3s;
            border: none;
        }

        main.searching .logo {
            width: 150px;
            margin-bottom: 20px;
        }

        .search-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative; /* Needed for absolute positioning of suggestions */
        }

        .search-bar-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            width: 584px;
            max-width: 90%;
            padding: 5px 15px;
            background: white;
            z-index: 10;
        }

        .search-bar-wrapper:hover, .search-bar-wrapper.has-suggestions {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }

        .search-bar-wrapper input {
            border: none;
            outline: none;
            height: 34px;
            font-size: 16px;
            flex-grow: 1;
            padding: 0 10px;
        }

        /* Suggestions Styling */
        #suggestions-list {
            width: 584px;
            max-width: 90%;
            background: white;
            border: 1px solid #dfe1e5;
            border-top: none;
            border-radius: 0 0 24px 24px;
            box-shadow: 0 4px 6px rgba(32,33,36,0.28);
            display: none;
            position: absolute;
            top: 45px;
            list-style: none;
            padding: 10px 0;
            margin: 0;
            z-index: 5;
        }

        .suggestion-item {
            padding: 10px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .suggestion-item:hover, .suggestion-item.selected {
            background-color: #f1f3f4;
        }

        .buttons {
            margin-top: 30px;
            display: flex;
            gap: 12px;
        }

        #results-area {
            margin-top: 40px;
            width: 584px;
            max-width: 90%;
            display: none;
        }

        .result-item {
            text-align: left;
            padding: 20px 0; 
            border-bottom: 1px solid #eee;
        }

        .result-item a {
            color: #1a0dab;
            font-size: 22px; 
            text-decoration: none;
            display: block;
            margin-bottom: 3px;
        }

        .result-item a:hover { text-decoration: underline; }

        .result-url {
            color: #202124;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 4px;
            display: block;
        }

        .result-desc {
            color: #4d5156;
            font-size: 16px;
            line-height: 1.58;
            margin: 5px 0 0 0;
        }

        .btn {
            background-color: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            padding: 0 16px;
            line-height: 36px;
            cursor: pointer;
            color: #3c4043;
        }

        .btn:hover {
            border: 1px solid #dadce0;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        footer { background: #f2f2f2; font-size: 14px; margin-top: auto; }
        .footer-bottom { display: flex; justify-content: space-between; padding: 15px 30px; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left"><a id="home-link">Home</a></div>
        <div class="nav-right">
            <a href="#">LAVA Mail</a>
            <a href="#">Images</a>
            <div style="background: #5f6368; width: 32px; height: 32px; border-radius: 50%;"></div>
        </div>
    </nav>

    <main id="main-content">
        <a class="logo-link" id="home-trigger">
            <img src="https://48034691.fs1.hubspotusercontent-na1.net/hubfs/48034691/__hs-marketplace__/LAVA%20Logo%20-%20Black-1.png" alt="LAVA Automation" class="logo">
        </a>
        <div class="search-container">
            <div class="search-bar-wrapper" id="bar-wrapper">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="#9aa0a6"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
                <input type="text" id="search-input" autocomplete="off" autofocus placeholder="Search LAVA...">
            </div>
            <ul id="suggestions-list"></ul>
            
            <div class="buttons" id="button-row">
                <button class="btn" id="search-btn">LAVA Search</button>
                <button class="btn">I'm Feeling Productive</button>
            </div>
            <div id="results-area"></div>
        </div>
    </main>

    <footer>
        <div class="footer-bottom">
            <span>Australia</span>
            <div style="display:flex; gap:20px"><span>Privacy</span><span>Terms</span></div>
        </div>
    </footer>

    <script>
        const database = [
            {
                keywords: ["hubstaff", "time tracking", "productivity", "payroll", "work"],
                url: "https://hubstaff.com/",
                title: "Hubstaff - Time Tracking and Productivity Software",
                description: "The all-in-one work management platform that offers time tracking, proof of work, and payroll for remote, hybrid, and field teams."
            },
            {
                keywords: ["lava university", "learn", "training", "education"],
                url: "https://university.lavaautomation.com",
                title: "Lava University - Learn Automation",
                description: "The official training platform for LAVA Automation experts. Master workflows and productivity tools."
            },
            {
                keywords: ["lava automation", "home", "main site", "company"],
                url: "https://www.lavaautomation.com",
                title: "LAVA Automation | Streamline Your Business",
                description: "Innovative automation solutions to help your business grow faster and smarter."
            },
            {
                keywords: ["world time buddy", "timezone", "clock", "time converter", "meeting", "wtb", "time"],
                url: "https://www.worldtimebuddy.com/",
                title: "World Time Buddy - Time Zone Converter",
                description: "A popular visual world clock, time zone converter, and online meeting scheduler for distributed teams."
            }
        ];

        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const resultsArea = document.getElementById('results-area');
        const mainContent = document.getElementById('main-content');
        const buttonRow = document.getElementById('button-row');
        const suggestionsList = document.getElementById('suggestions-list');
        const barWrapper = document.getElementById('bar-wrapper');
        
        let selectedIndex = -1;

        function getFilteredResults(query) {
            return database.filter(item => {
                const matchesKeyword = item.keywords.some(key => key.toLowerCase().includes(query));
                const matchesTitle = item.title.toLowerCase().includes(query);
                const matchesDescription = item.description.toLowerCase().includes(query);
                return matchesKeyword || matchesTitle || matchesDescription;
            });
        }

        function performSearch() {
            const rawQuery = searchInput.value.toLowerCase().trim();
            if (rawQuery === "") return;

            const matchedResults = getFilteredResults(rawQuery);

            mainContent.classList.add('searching');
            buttonRow.style.display = "none";
            resultsArea.style.display = "block";
            hideSuggestions();

            renderResults(matchedResults);
        }

        function renderResults(results) {
            if (results.length === 0) {
                resultsArea.innerHTML = `<div class="no-results" style="margin-top:20px">No results found for "${searchInput.value}".</div>`;
                return;
            }
            resultsArea.innerHTML = results.map(item => `
                <div class="result-item">
                    <span class="result-url">${item.url}</span>
                    <a href="${item.url}" target="_blank">${item.title}</a>
                    <p class="result-desc">${item.description}</p>
                </div>
            `).join('');
        }

        function showSuggestions() {
            const query = searchInput.value.toLowerCase().trim();
            if (query.length === 0) {
                hideSuggestions();
                return;
            }

            const matches = getFilteredResults(query);
            if (matches.length > 0) {
                suggestionsList.innerHTML = matches.map((item, index) => `
                    <li class="suggestion-item" data-index="${index}" onclick="selectSuggestion('${item.title}')">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="#9aa0a6"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
                        ${item.title}
                    </li>
                `).join('');
                suggestionsList.style.display = 'block';
                barWrapper.style.borderRadius = "24px 24px 0 0";
            } else {
                hideSuggestions();
            }
        }

        function selectSuggestion(title) {
            searchInput.value = title;
            performSearch();
        }

        function hideSuggestions() {
            suggestionsList.style.display = 'none';
            barWrapper.style.borderRadius = "24px";
            selectedIndex = -1;
        }

        // Event Listeners
        searchInput.addEventListener('input', showSuggestions);

        searchInput.addEventListener('keydown', (e) => {
            const items = document.querySelectorAll('.suggestion-item');
            if (e.key === 'ArrowDown') {
                selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
                updateSelection(items);
            } else if (e.key === 'ArrowUp') {
                selectedIndex = Math.max(selectedIndex - 1, -1);
                updateSelection(items);
            } else if (e.key === 'Enter') {
                if (selectedIndex > -1) {
                    searchInput.value = items[selectedIndex].innerText.trim();
                }
                performSearch();
            } else if (e.key === 'Escape') {
                hideSuggestions();
            }
        });

        function updateSelection(items) {
            items.forEach((item, index) => {
                item.classList.toggle('selected', index === selectedIndex);
            });
        }

        // Close suggestions if clicking outside
        document.addEventListener('click', (e) => {
            if (!barWrapper.contains(e.target) && !suggestionsList.contains(e.target)) {
                hideSuggestions();
            }
        });

        searchBtn.addEventListener('click', performSearch);
        document.getElementById('home-link').addEventListener('click', () => location.reload());
        document.getElementById('home-trigger').addEventListener('click', () => location.reload());
    </script>
</body>
</html>
