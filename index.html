<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAVA Search + AI</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #202124;
            --nav-link: rgba(0,0,0,0.87);
            --search-border: #dfe1e5;
            --btn-bg: #f8f9fa;
            --btn-text: #3c4043;
            --footer-bg: #f2f2f2;
            --result-link: #1a0dab;
            --result-desc: #4d5156;
            --suggestion-hover: #f1f3f4;
            --ai-accent: #8ab4f8;
        }

        [data-theme="dark"] {
            --bg-color: #202124;
            --text-color: #e8eaed;
            --nav-link: #e8eaed;
            --search-border: #5f6368;
            --btn-bg: #303134;
            --btn-text: #e8eaed;
            --footer-bg: #171717;
            --result-link: #8ab4f8;
            --result-desc: #bdc1c6;
            --suggestion-hover: #3c4043;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            display: flex; flex-direction: column;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
        }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .nav-left, .nav-right { display: flex; gap: 15px; font-size: 13px; align-items: center; }
        nav a { text-decoration: none; color: var(--nav-link); cursor: pointer; }
        
        #theme-toggle { background: none; border: none; cursor: pointer; color: var(--nav-link); }

        main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.3s ease; }
        main.searching { justify-content: flex-start; padding-top: 20px; }

        .logo { width: 272px; margin-bottom: 30px; transition: width 0.3s; }
        main.searching .logo { width: 120px; margin-bottom: 20px; }

        .search-container { width: 100%; display: flex; flex-direction: column; align-items: center; position: relative; }
        .search-bar-wrapper { 
            display: flex; align-items: center; 
            border: 1px solid var(--search-border); border-radius: 24px;
            width: 584px; max-width: 90%; padding: 5px 15px;
            background: var(--bg-color); z-index: 10;
        }

        .search-bar-wrapper input { border: none; outline: none; height: 34px; font-size: 16px; flex-grow: 1; background: transparent; color: var(--text-color); }

        #suggestions-list {
            width: 584px; max-width: 90%; background: var(--bg-color);
            border: 1px solid var(--search-border); border-radius: 0 0 24px 24px;
            display: none; position: absolute; top: 45px; list-style: none; padding: 10px 0; z-index: 5;
        }

        .suggestion-item { padding: 10px 20px; cursor: pointer; }
        .suggestion-item:hover { background-color: var(--suggestion-hover); }

        .buttons { margin-top: 30px; display: flex; gap: 12px; }
        .btn { background-color: var(--btn-bg); border: 1px solid var(--btn-bg); border-radius: 4px; padding: 0 16px; line-height: 36px; cursor: pointer; color: var(--btn-text); }

        #results-area { margin-top: 30px; width: 652px; max-width: 90%; display: none; }

        /* AI BOX STYLING */
        #ai-box {
            background: var(--btn-bg);
            border: 1px solid var(--search-border);
            border-left: 4px solid var(--ai-accent);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease;
        }

        .result-item { padding: 15px 0; border-bottom: 1px solid var(--search-border); }
        .result-item a { color: var(--result-link); font-size: 20px; text-decoration: none; }
        .result-desc { color: var(--result-desc); margin-top: 5px; font-size: 14px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        footer { background: var(--footer-bg); font-size: 14px; margin-top: auto; padding: 15px 30px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left"><a onclick="location.reload()">Home</a></div>
        <div class="nav-right">
            <button id="theme-toggle">
                <svg id="theme-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 7.5 13.5A9 9 0 1 1 12 3z"/></svg>
            </button>
            <a href="#">LAVA Mail</a>
            <div style="background: #5f6368; width: 32px; height: 32px; border-radius: 50%;"></div>
        </div>
    </nav>

    <main id="main-content">
        <img src="https://48034691.fs1.hubspotusercontent-na1.net/hubfs/48034691/__hs-marketplace__/LAVA%20Logo%20-%20Black-1.png" alt="LAVA" class="logo" id="main-logo">
        <div class="search-container">
            <div class="search-bar-wrapper">
                <input type="text" id="search-input" autocomplete="off" autofocus placeholder="Search LAVA or ask a question...">
            </div>
            <ul id="suggestions-list"></ul>
            <div class="buttons" id="button-row">
                <button class="btn" id="search-btn">LAVA Search</button>
                <button class="btn">I'm Feeling Productive</button>
            </div>
            
            <div id="results-area">
                <div id="ai-box" style="display:none;">
                    <div style="font-weight: bold; margin-bottom: 8px; color: var(--ai-accent); font-size: 12px; text-transform: uppercase;">AI Overview</div>
                    <div id="ai-text">Thinking...</div>
                </div>
                <div id="web-results"></div>
            </div>
        </div>
    </main>

    <footer>
        <span>Australia</span>
        <div style="display:flex; gap:20px"><span>Privacy</span><span>Terms</span></div>
    </footer>

    <script>
        const database = [
            { keywords: ["hubstaff", "time"], url: "https://hubstaff.com/", title: "Hubstaff - Time Tracking", description: "All-in-one work management platform." },
            { keywords: ["university", "learn"], url: "https://university.lavaautomation.com", title: "Lava University", description: "Official training platform for LAVA experts." },
            { keywords: ["lava", "automation"], url: "https://www.lavaautomation.com", title: "LAVA Automation", description: "Innovative automation solutions." }
        ];

        const searchInput = document.getElementById('search-input');
        const resultsArea = document.getElementById('results-area');
        const aiBox = document.getElementById('ai-box');
        const aiText = document.getElementById('ai-text');
        const webResults = document.getElementById('web-results');

        // Theme Toggle
        document.getElementById('theme-toggle').onclick = () => {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        };

        async function performSearch() {
            const query = searchInput.value.trim().toLowerCase();
            if (!query) return;

            document.getElementById('main-content').classList.add('searching');
            document.getElementById('button-row').style.display = "none";
            resultsArea.style.display = "block";

            // 1. Simulate AI Answer
            aiBox.style.display = "block";
            aiText.innerText = "Processing query...";
            
            setTimeout(() => {
                if (query.includes("what is lava")) {
                    aiText.innerHTML = "<strong>LAVA Automation</strong> is a company specializing in business process optimization. They offer training via <strong>Lava University</strong> and custom automation tools.";
                } else {
                    aiText.innerHTML = `You searched for "${query}". I am a mini-AI logic box. To get real-time answers, you can connect this box to the OpenAI or Gemini API.`;
                }
            }, 800);

            // 2. Search Database
            const matches = database.filter(item => 
                item.title.toLowerCase().includes(query) || 
                item.keywords.some(k => k.includes(query))
            );

            webResults.innerHTML = matches.map(item => `
                <div class="result-item">
                    <a href="${item.url}" target="_blank">${item.title}</a>
                    <p class="result-desc">${item.description}</p>
                </div>
            `).join('') || `<p>No local matches found. Try asking the AI!</p>`;
        }

        searchInput.onkeypress = e => e.key === 'Enter' && performSearch();
        document.getElementById('search-btn').onclick = performSearch;
    </script>
</body>
</html>
